<style>
:root{
  --bg:#f4f5f7; --card:#ffffff; --card2:#eef0f3; --text:#12161c; --muted:#5b6472; --border:#dfe2e7;
  --primary:#2f6f4f; --primary-text:#ffffff; --primary-dim:#e5f0ea;
  --danger:#a8402a; --danger-dim:#f6e4df; --warn:#8a6400; --warn-dim:#f5edd8;
  --radius:16px; --radius-sm:10px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f1216; --card:#1a1f26; --card2:#212832; --text:#e9edf2; --muted:#9aa5b3; --border:#2b323d;
    --primary:#4f9d76; --primary-text:#06130c; --primary-dim:#183226;
    --danger:#e0755c; --danger-dim:#3a231d; --warn:#e2b84a; --warn-dim:#3a3115;
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.45; -webkit-tap-highlight-color:transparent;
  padding-bottom:calc(16px + var(--safe-bottom));
}
h1,h2,h3,p,ul,ol{margin:0 0 12px 0;}
ul,ol{padding-left:20px;}
button{font:inherit;}
input,select{font:inherit;}
.screen{max-width:520px;margin:0 auto;padding:16px 16px 32px 16px;}
.app-header{
  position:sticky;top:0;z-index:5;background:var(--bg);
  display:flex;align-items:center;gap:8px;padding:14px 16px 6px 16px;max-width:520px;margin:0 auto;
}
.app-header h1{font-size:19px;margin:0;flex:1;}
.icon-btn{
  min-width:44px;min-height:44px;border:none;background:transparent;color:var(--text);
  border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;
}
.icon-btn:active{background:var(--card2);}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;
}
.muted{color:var(--muted);font-size:14px;}
.small{font-size:13px;}
.center{text-align:center;}
.row{display:flex;align-items:center;gap:10px;}
.row.wrap{flex-wrap:wrap;}
.space-between{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.stack{display:flex;flex-direction:column;gap:10px;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:48px;padding:12px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--card2);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;
}
.btn:active{opacity:.75;}
.btn-block{display:flex;width:100%;}
.btn-primary{background:var(--primary);color:var(--primary-text);border-color:var(--primary);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted);}
.btn-danger{background:var(--danger-dim);color:var(--danger);border-color:transparent;}
.btn-sm{min-height:40px;padding:8px 14px;font-size:14px;}
.btn-huge{min-height:72px;font-size:19px;border-radius:20px;}
.badge{
  display:inline-block;padding:3px 10px;border-radius:999px;background:var(--primary-dim);color:var(--primary);
  font-size:12px;font-weight:700;letter-spacing:.02em;
}
.badge.warn{background:var(--warn-dim);color:var(--warn);}
.badge.danger{background:var(--danger-dim);color:var(--danger);}
.banner{
  border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;font-size:14px;
  background:var(--warn-dim);color:var(--warn);border:1px solid transparent;
}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:13px;font-weight:600;color:var(--muted);}
.field input[type=text],.field input[type=password],.field input[type=number],.field input[type=time],.field input[type=date],.field select,.field textarea{
  min-height:48px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card2);
  color:var(--text);padding:10px 12px;width:100%;
}
.field textarea{min-height:80px;resize:vertical;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0;}
.switch{position:relative;width:50px;height:30px;flex:none;}
.switch input{opacity:0;width:100%;height:100%;position:absolute;margin:0;cursor:pointer;}
.switch .track{position:absolute;inset:0;background:var(--card2);border:1px solid var(--border);border-radius:999px;transition:background .15s;}
.switch .thumb{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--muted);transition:transform .15s;}
.switch input:checked + .track{background:var(--primary-dim);border-color:var(--primary);}
.switch input:checked + .track + .thumb{transform:translateX(20px);background:var(--primary);}
.daypicker{display:flex;gap:6px;flex-wrap:wrap;}
.daypicker button{
  min-width:44px;min-height:44px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--card2);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;
}
.daypicker button.active{background:var(--primary);color:var(--primary-text);border-color:var(--primary);}
.stepper{display:flex;align-items:center;justify-content:center;gap:18px;margin:18px 0;}
.stepper .val{font-size:44px;font-weight:800;min-width:90px;text-align:center;}
.stepper .unit{font-size:14px;color:var(--muted);font-weight:500;display:block;margin-top:2px;}
.stepper button{
  width:56px;height:56px;border-radius:50%;border:1px solid var(--border);background:var(--card2);
  color:var(--text);font-size:26px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.stepper button:active{background:var(--primary-dim);}
.figure-wrap{
  background:var(--card2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  padding:10px;margin-bottom:12px;
}
.figure-wrap svg{width:100%;max-width:280px;height:auto;display:block;}
.pose2{opacity:0;}
.stickfig.animate .pose1{animation:stickA 2.4s steps(1) infinite;}
.stickfig.animate .pose2{animation:stickB 2.4s steps(1) infinite;}
@keyframes stickA{0%,54%{opacity:1;}55%,100%{opacity:0;}}
@keyframes stickB{0%,54%{opacity:0;}55%,100%{opacity:1;}}
.progress-dots{display:flex;gap:5px;justify-content:center;margin:10px 0 4px 0;flex-wrap:wrap;}
.progress-dots span{width:8px;height:8px;border-radius:50%;background:var(--border);}
.progress-dots span.done{background:var(--primary);}
.progress-dots span.now{background:var(--text);}
.timer-ring{
  width:180px;height:180px;border-radius:50%;margin:6px auto 14px auto;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:conic-gradient(var(--primary) calc(var(--pct,0)*1%), var(--card2) 0);
}
.timer-ring .inner{
  width:150px;height:150px;border-radius:50%;background:var(--card);display:flex;
  flex-direction:column;align-items:center;justify-content:center;
}
.timer-ring .time{font-size:34px;font-weight:800;}
.list-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 4px;
  border-bottom:1px solid var(--border);cursor:pointer;min-height:48px;
}
.list-row:last-child{border-bottom:none;}
.feedback-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.feedback-grid button{
  min-height:48px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card2);
  color:var(--text);font-size:13px;font-weight:600;cursor:pointer;padding:8px 6px;
}
.feedback-grid button.active{background:var(--primary);color:var(--primary-text);border-color:var(--primary);}
.feedback-grid button.active.warn-sel{background:var(--warn);color:#1a1400;border-color:var(--warn);}
.feedback-grid button.active.danger-sel{background:var(--danger);color:#fff;border-color:var(--danger);}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;
  z-index:20;
}
.modal{
  background:var(--card);border-radius:20px 20px 0 0;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;
  padding:18px 18px calc(24px + var(--safe-bottom)) 18px;
}
.modal.centered{border-radius:20px;margin:16px;max-height:80vh;}
details{margin-bottom:10px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;background:var(--card2);}
details summary{font-weight:600;cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;}
details summary::-webkit-details-marker{display:none;}
details[open] summary{margin-bottom:8px;}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:110px;padding-top:10px;}
.bar-chart .bar{flex:1;background:var(--primary);border-radius:4px 4px 0 0;min-height:3px;position:relative;}
.bar-chart .bar .lbl{position:absolute;bottom:100%;left:0;right:0;text-align:center;font-size:10px;color:var(--muted);margin-bottom:2px;}
.tabbar{display:flex;gap:6px;margin-bottom:14px;background:var(--card2);border-radius:var(--radius-sm);padding:4px;}
.tabbar button{flex:1;min-height:40px;border:none;background:transparent;border-radius:8px;color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;}
.tabbar button.active{background:var(--card);color:var(--text);}
.copybox{
  background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;
  font-size:13px;white-space:pre-wrap;max-height:260px;overflow-y:auto;margin-bottom:10px;
}
a{color:var(--primary);}
.fine{font-size:12px;color:var(--muted);}
</style>
</head>

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if(!parsed.voortgang) parsed.voortgang = defaultVoortgang(parsed.programma);
    if(typeof parsed.instellingen.autoRun!=="boolean") parsed.instellingen.autoRun = true;
    if(typeof parsed.instellingen.spraak!=="boolean") parsed.instellingen.spraak = true;

}

/* ===================== UTIL: datum & week ===================== */
const DAGNAMEN = ["zo","ma","di","wo","do","vr","za"];
const DAGNAMEN_VOL = ["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"];
function todayMidnight(){ const d = new Date(); d.setHours(12,0,0,0); return d; }
function isoDate(d){ const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,"0"); const day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function parseIso(s){ return new Date(s+"T12:00:00"); }
function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDatumKort(d){ if(typeof d === "string") d = parseIso(d); return d.toLocaleDateString("nl-NL",{day:"numeric",month:"short"}); }
function nextDateForWeekday(weekday){
  const t = todayMidnight();
  const diff = (weekday - t.getDay() + 7) % 7;
  return addDays(t, diff);
}
function effectiveStart(programma){
  return addDays(parseIso(programma.startDatum), programma.verschovenDagen||0);
}
function weekInfo(){
  const start = effectiveStart(state.programma);
  const today = todayMidnight();
  const diffDays = Math.round((today-start)/86400000);
  const weekNummer = Math.floor(diffDays/7)+1;
  return {start, weekNummer, blokVoltooid: weekNummer > state.programma.duurWeken};
}
function weekStartDatum(weekNummer){
  return addDays(effectiveStart(state.programma), (weekNummer-1)*7);
}
function sessiesInWeek(weekNummer){
  const start = weekStartDatum(weekNummer);
  const end = addDays(start,7);
  return state.log.sessies.filter(s=>{
    const d = parseIso(s.datum);
    return d>=start && d<end;
  });
}
function eindDatumBlok(){
  return addDays(effectiveStart(state.programma), state.programma.duurWeken*7);
}

/* ===================== UTIL: lookups ===================== */
function getOefening(id){ return state.programma.oefeningen.find(o=>o.id===id); }
function getWorkout(id){ return state.programma.workouts.find(w=>w.id===id); }
function getNiveau(oefening, n){ return oefening.niveaus.find(nv=>nv.n===n) || oefening.niveaus[0]; }
function huidigNiveau(oefeningId){
  const oef = getOefening(oefeningId);
  const vg = state.voortgang[oefeningId];
  return getNiveau(oef, vg ? vg.niveau : 1);
}
function doelBereik(oefeningId){
  const niveau = huidigNiveau(oefeningId);
  const adjust = (state.voortgang[oefeningId] && state.voortgang[oefeningId].rangeAdjust) || 0;
  return {min: Math.max(1, niveau.min+adjust), max: Math.max(1, niveau.max+adjust), niveau};
}
function ensureVoortgang(oefeningId){
  if(!state.voortgang[oefeningId]){
    state.voortgang[oefeningId] = {niveau:1, promotieTeller:0, zwaarTeller:0, nietLekkerTeller:0, vervangingsmarkering:false, rangeAdjust:0, geintroduceerd:false};
  }
  return state.voortgang[oefeningId];
}
function heeftOoitGedaan(oefeningId){
  return state.log.sessies.some(s=>s.sets.some(st=>st.oefeningId===oefeningId));
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function seg(p1,p2){ return `<line x1="${p1[0]}" y1="${p1[1]}" x2="${p2[0]}" y2="${p2[1]}" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>`; }
function poseLines(pose){
  let out = `<circle cx="${pose.head[0]}" cy="${pose.head[1]}" r="9" fill="currentColor"/>`;
  if(pose.shoulder && pose.hip) out += seg(pose.shoulder,pose.hip);
  if(pose.shoulder && pose.elbow) out += seg(pose.shoulder,pose.elbow);
  if(pose.elbow && pose.hand) out += seg(pose.elbow,pose.hand);
  if(pose.shoulder2 && pose.elbow2) out += seg(pose.shoulder2,pose.elbow2);
  if(pose.elbow2 && pose.hand2) out += seg(pose.elbow2,pose.hand2);
  if(pose.hip && pose.knee) out += seg(pose.hip,pose.knee);
  if(pose.knee && pose.foot) out += seg(pose.knee,pose.foot);
  if(pose.hip && pose.knee2) out += seg(pose.hip,pose.knee2);
  if(pose.knee2 && pose.foot2) out += seg(pose.knee2,pose.foot2);
  return out;
}

  save();

    const wi = weekInfo();
    if(wi.blokVoltooid && !state.programma.blokreviewGedaan) ui.screen = "blokreview";
  }
  if(ui.screen==="afsluiten" && !ui.afsluit) ui.screen = "vandaag";
  let html = "";

    html = renderOnboarding();
  } else if(ui.flow){
    html = renderWorkoutFlow();
  } else {

      case "vandaag": html = renderHeader("Kernkracht") + renderVandaag(); break;
      case "afsluiten": html = renderHeader("Sessie afronden") + renderAfsluiten(); break;
      case "voortgang": html = renderHeader("Voortgang", true) + renderVoortgang(); break;
      case "blokreview": html = renderHeader("Blokreview") + renderBlokreview(); break;
      case "instellingen": html = renderHeader("Instellingen", true) + renderInstellingen(); break;
      case "export": html = renderHeader("Export & import", true) + renderExport(); break;

  if(ui.microKeuzeOpen) overlay += renderMicroKeuzeModal();

  wireCommon();
}

/* ===================== SCREEN WAKE LOCK ===================== */
// Zonder dit dooft het scherm tijdens een handsfree workout vanzelf (geen aanraking nodig =
// geen signaal voor Android dat de telefoon actief gebruikt wordt).
let wakeLock = null;
async function acquireWakeLock(){
  if(!("wakeLock" in navigator)) return;
  try{
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
}
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible" && ui.flow && !wakeLock) acquireWakeLock();
});

function suggestieWorkoutId(){
  const wi = weekInfo();
  const sessies = sessiesInWeek(wi.weekNummer);
  const hoofdGedaan = sessies.some(s=>s.workoutId==="hoofd");
  const microCount = sessies.filter(s=>s.workoutId!=="hoofd").length;
  if(!hoofdGedaan) return "hoofd";
  if(!state.instellingen.seizoen && microCount<1) return "microA";
  return null;
}
function normTekst(){
  return state.instellingen.seizoen
    ? "Norm: 1 hoofdworkout per week. Micro-workouts zijn optioneel."
    : "Norm: hoofdworkout + 1 micro-workout per week.";
}

    banners += `<div class="banner" style="background:var(--primary-dim);color:var(--primary)">Dit blok is afgerond. Importeer een nieuw programmablok via <a href="#" data-action="ga-export">export &amp; import</a> om verder te gaan.</div>`;
  }

  const weekBadge = wi.weekNummer<1
    ? `<span class="badge">Start ${fmtDatumKort(state.programma.startDatum)}</span>`
    : (wi.blokVoltooid ? `<span class="badge">Blok afgerond</span>` : `<span class="badge">Week ${wi.weekNummer} / ${state.programma.duurWeken}</span>`);
  return `<div class="screen">

      <span class="badge">${escapeHtml(state.programma.naam)}</span>

    </div>

/* ===================== WORKOUT-FLOW (scherm 2) ===================== */
function buildSteps(workout){
  const items = workout.oefeningen;
  const groups = [];
  let i=0;
  while(i<items.length){
    const cur = items[i];
    if(cur.superset){
      const key = cur.superset;
      const g = [];
      while(i<items.length && items[i].superset===key){ g.push(items[i]); i++; }
      groups.push(g);
    } else {
      groups.push([cur]);
      i++;
    }
  }
  const steps = [];
  groups.forEach((group, gi)=>{
    const maxSets = Math.max(...group.map(g=>g.sets));
    for(let s=1; s<=maxSets; s++){
      group.forEach(wo=>{
        if(s>wo.sets) return;
        const oef = getOefening(wo.oefeningId);
        const {min,max,niveau} = doelBereik(wo.oefeningId);
        const base = {type:"set", oefeningId:wo.oefeningId, oefening:oef, set:s, totalSets:wo.sets, niveau, min, max, rustSec:wo.rustSec};
        if(niveau.perKant){
          steps.push(Object.assign({},base,{kant:"links"}));
          steps.push(Object.assign({},base,{kant:"rechts"}));
        } else {
          steps.push(Object.assign({},base,{kant:null}));
        }
      });
      const isLast = (gi===groups.length-1) && (s===maxSets);
      if(!isLast) steps.push({type:"rest", sec:group[0].rustSec||60});
    }
  });
  return steps;
}
function startWorkout(workoutId){
  const workout = getWorkout(workoutId);
  const steps = buildSteps(workout);
  ui.flow = {
    workoutId, steps, index:0, results:[], startTime:Date.now(),
    warmup: workout.warmingUp.length>0, warmupAnnounced:false, timer:null, restRemaining:0, restTotal:0,
    holdTimer:null, holdRemaining:0, holdTotal:0, holdRunning:false,
    secTimer:null, secElapsed:0, secTotal:0, secRunning:false,
    inputVal:null,
    autoRun: state.instellingen.autoRun!==false,
    autoTimer:null, autoPhase:null, autoStarted:false, autoRepsCompleted:0,
    countdownTimer:null, countdownVal:0, pausedForDetail:false
  };
  acquireWakeLock();
  saveFlowSnapshot();
  render();
}
function currentStep(){ return ui.flow.steps[ui.flow.index]; }
function clearTimers(){
  // Stopt alleen de lopende intervallen/timeouts, NIET de spraak — zie stopSpeech() daarvoor.
  // Anders kapt elke stap-overgang de laatst gesproken zin ("Klaar.", "Ga verder.") af.
  if(ui.flow.timer){ clearInterval(ui.flow.timer); ui.flow.timer=null; }
  if(ui.flow.holdTimer){ clearInterval(ui.flow.holdTimer); ui.flow.holdTimer=null; }
  if(ui.flow.secTimer){ clearInterval(ui.flow.secTimer); ui.flow.secTimer=null; }
  // clearInterval also cancels setTimeout handles in every evergreen browser (shared id pool) — autoTimer/countdownTimer use both
  if(ui.flow.autoTimer){ clearInterval(ui.flow.autoTimer); ui.flow.autoTimer=null; }
  if(ui.flow.countdownTimer){ clearInterval(ui.flow.countdownTimer); ui.flow.countdownTimer=null; }
}
function advanceStep(){
  clearTimers();
  ui.flow.index++;
  resetStepAutoState(ui.flow);
  if(ui.flow.index >= ui.flow.steps.length){
    finishWorkout();
  } else {
    saveFlowSnapshot();
    render();
  }
}
function resetStepAutoState(f){
  f.inputVal = null;
  f.secElapsed = 0; f.secTotal = 0; f.secRunning = false;
  f.holdRunning = false; f.holdTotal = 0;
  f.autoPhase = null; f.autoStarted = false; f.autoRepsCompleted = 0;
  f.countdownVal = 0;
}
// Opent iemand de volledige uitleg midden in een workout, dan mis je anders de gesproken cue of
// blijft de timer achter de modal doortikken. Pauzeren dus, en bij sluiten de aankondiging +
// aftelling van die set gewoon opnieuw beginnen (niet hervatten — dat gaf verwarrende halve cues).
function pauseFlowForDetail(){
  const f = ui.flow;
  if(!f || f.pausedForDetail) return;
  stopSpeech();
  clearTimers();
  f.pausedForDetail = true;
}
function resumeFlowAfterDetail(){
  const f = ui.flow;
  if(!f || !f.pausedForDetail) return;
  f.pausedForDetail = false;
  resetStepAutoState(f);
}
/* ===================== TTS: beste beschikbare stem kiezen ===================== */
let ttsVoice = null;
let ttsVoicesChecked = false;
function scoreVoice(v){
  const lang = (v.lang||"").toLowerCase();
  let score = 0;
  if(lang==="nl-nl") score += 4;
  else if(lang.startsWith("nl")) score += 2;
  else return -1;
  if(!v.localService) score += 3; // netwerk/cloud-stemmen klinken doorgaans natuurlijker dan het lokale device-tts
  if(/google/i.test(v.name)) score += 1;
  return score;
}
function refreshTtsVoice(){
  if(!("speechSynthesis" in window)) return;
  const voices = speechSynthesis.getVoices();
  if(!voices || voices.length===0) return;
  ttsVoicesChecked = true;
  let best = null, bestScore = -1;
  voices.forEach(v=>{
    const s = scoreVoice(v);
    if(s>bestScore){ bestScore = s; best = v; }
  });
  ttsVoice = best;
}
if("speechSynthesis" in window){
  refreshTtsVoice();
  speechSynthesis.onvoiceschanged = refreshTtsVoice;
}
// speak() is fire-and-forget door de rest van de app, maar geeft desgewenst een onDone-callback
// terug (via speechSynthesis' onend / Audio's onended) zodat aankondiging -> aftellen -> start
// netjes na elkaar lopen zonder dat een zin halverwege wordt afgekapt. Timers stoppen (clearTimers)
// stopt daarom NIET automatisch de spraak — dat gebeurt alleen expliciet via stopSpeech().
function speakLocal(text, onDone){
  if(!("speechSynthesis" in window)){ if(onDone) onDone(); return; }
  try{
    if(!ttsVoicesChecked) refreshTtsVoice();
    const u = new SpeechSynthesisUtterance(text);
    if(ttsVoice){ u.voice = ttsVoice; u.lang = ttsVoice.lang; }
    else { u.lang = "nl-NL"; }
    u.rate = 1.15;
    u.pitch = 1;
    if(onDone){ u.onend = onDone; u.onerror = onDone; }
    speechSynthesis.speak(u);
  }catch(e){ if(onDone) onDone(); }
}

/* ---- Azure Cognitive Services Speech (optioneel, eigen sleutel) ---- */
const AZURE_VOICES = [
  {value:"nl-NL-FennaNeural", label:"Fenna (vrouw)", gender:"Female"},
  {value:"nl-NL-ColetteNeural", label:"Colette (vrouw)", gender:"Female"},
  {value:"nl-NL-MaartenNeural", label:"Maarten (man)", gender:"Male"}
];
const azureCache = new Map(); // tekst -> blob-url, scheelt een netwerk-call bij herhaalde cues ("Vast." / "Los.")
let azureAudioEl = null;
let azureQueue = [];
let azurePlaying = false;
function azureConfigured(){
  return !!(state.instellingen.azureKey && state.instellingen.azureRegion);
}
function escapeXml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&apos;"}[c]));
}
function speakAzure(text, onDone){
  const i = state.instellingen;
  const voice = AZURE_VOICES.find(v=>v.value===i.azureVoice) || AZURE_VOICES[0];
  // Cache-key bevat de stem: anders speelt "Test stem" na het wisselen van stem alsnog de
  // eerder opgenomen (oude) stem af, omdat de tekst zelf ongewijzigd is.
  const cacheKey = voice.value + "::" + text;
  const cached = azureCache.get(cacheKey);
  if(cached){ enqueueAzure(cached, text, onDone); return; }
  const ssml = `<speak version='1.0' xml:lang='nl-NL'><voice xml:lang='nl-NL' xml:gender='${voice.gender}' name='${voice.value}'><prosody rate='+15%'>${escapeXml(text)}</prosody></voice></speak>`;
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(), 4000);
  fetch(`https://${i.azureRegion}.tts.speech.microsoft.com/cognitiveservices/v1`, {
    method:"POST",
    headers:{
      "Ocp-Apim-Subscription-Key": i.azureKey,
      "Content-Type": "application/ssml+xml",
      "X-Microsoft-OutputFormat": "audio-16khz-32kbitrate-mono-mp3"
    },
    body: ssml,
    signal: controller.signal
  }).then(res=>{
    clearTimeout(timeout);
    if(!res.ok) throw new Error("Azure TTS HTTP " + res.status);
    return res.blob();
  }).then(blob=>{
    const url = URL.createObjectURL(blob);
    azureCache.set(cacheKey, url);
    enqueueAzure(url, text, onDone);
  }).catch(()=>{
    clearTimeout(timeout);
    speakLocal(text, onDone); // netwerk weg, sleutel ongeldig, quotum op — val stil terug op de systeemstem
  });
}
// Eén gedeeld <audio>-element kan maar één ding tegelijk afspelen — zonder wachtrij zou elke
// nieuwe speak()-aanroep de vorige zin direct afkappen. Deze wachtrij speelt ze na elkaar af.
function enqueueAzure(url, fallbackText, onDone){
  azureQueue.push({url, fallbackText, onDone});
  if(!azurePlaying) playNextAzure();
}
function playNextAzure(){
  if(azureQueue.length===0){ azurePlaying=false; return; }
  azurePlaying = true;
  const item = azureQueue.shift();
  if(!azureAudioEl) azureAudioEl = new Audio();
  azureAudioEl.onended = azureAudioEl.onerror = () => { if(item.onDone) item.onDone(); playNextAzure(); };
  azureAudioEl.src = item.url;
  azureAudioEl.play().catch(()=>{
    if(item.fallbackText) speakLocal(item.fallbackText, item.onDone); else if(item.onDone) item.onDone();
    playNextAzure();
  });
}
function stopAzureQueue(){
  azureQueue = [];
  azurePlaying = false;
  if(azureAudioEl){
    azureAudioEl.onended = null; azureAudioEl.onerror = null;
    try{ azureAudioEl.pause(); }catch(e){}
  }
}
// TTS-engines spreken "10x" uit als de letter x in plaats van "10 keer" — dit normaliseert dat
// soort schrijftaal-afkortingen naar spreektaal voordat de tekst naar de stem gaat. De zichtbare
// tekst op het scherm (bijv. in de warming-up-lijst) blijft ongewijzigd, dit raakt alleen spraak.
function speakableText(text){
  return text.replace(/(\d+)\s*[xX]\b/g, "$1 keer");
}
function speak(text, onDone){
  if(!state.instellingen.spraak){ if(onDone) onDone(); return; }
  const spoken = speakableText(text);
  if(azureConfigured()) speakAzure(spoken, onDone);
  else speakLocal(spoken, onDone);
}
// Onderbreekt alle spraak meteen — alleen aanroepen bij een bewuste context-wissel
// (uitleg openen, workout afbreken, naar een ander scherm navigeren), nooit bij een normale
// stap-overgang, anders wordt de laatste zin van de vorige stap afgekapt.
function stopSpeech(){
  if("speechSynthesis" in window) speechSynthesis.cancel();
  stopAzureQueue();
}
function speakTest(){
  refreshTtsVoice();
  const text = "Dit is de stem die je hoort tijdens je workout.";
  if(azureConfigured()) speakAzure(text); else speakLocal(text);
  render();
}
function stepAnnounceText(step){
  const kantTxt = step.kant ? (step.kant==="links" ? ", links" : ", rechts") : "";
  const setTxt = step.totalSets>1 ? `, set ${step.set} van ${step.totalSets}` : "";
  return `${step.oefening.naam}${kantTxt}${setTxt}.`;
}
function isAutoCapable(step){ return step.niveau.doelType==="seconden" || !!step.niveau.holdSec; }
// Elke set begint met alleen de oefeningnaam (geen doelbereik meer — dat staat al in beeld en in de
// "i"-uitleg), gevolgd door een 3-2-1 aftelling, en pas daarna de echte hold/timer. f.autoPhase is de
// enige waarheid over welke fase we in zitten: "announcing" (naam wordt uitgesproken, nog geen cijfer
// in beeld — voorheen verscheen de aftel-ring al terwijl de naam nog liep, doordat we op een gegokte
// vaste tijd wachtten in plaats van op het echte einde van de spraak), "counting" (3-2-1 in beeld) en
// "active" (de echte hold/seconden-timer loopt).
function beginAnnounceAndCountdown(step){
  const f = ui.flow;
  f.autoPhase = "announcing";
  f.countdownVal = 3;
  speak(stepAnnounceText(step), () => {
    // speak()'s onDone kan synchroon vuren (spraak staat uit) — via setTimeout altijd asynchroon
    // laten doorlopen, anders zou dit een render() aanroepen middenin de render() die renderSetStep
    // net aan het opbouwen was (dezelfde reentrancy die eerder navigatie brak).
    setTimeout(() => {
      if(!ui.flow || currentStep()!==step) return;
      f.autoPhase = "counting";
      render();
      countdownTick(step);
    }, 0);
  });
}
// Elke tick toont en spreekt het HUIDIGE getal, en pas ná de wachttijd van dat getal wordt er
// verder gegaan naar het volgende (of naar de echte start). Zo staat er nooit een render tussenin
// die een halfklare hold-view laat zien terwijl het aftellen nog bezig is.
function countdownTick(step){
  const f = ui.flow;
  if(!ui.flow || currentStep()!==step) return;
  speak(String(f.countdownVal));
  render();
  f.countdownTimer = setTimeout(()=>{
    if(f.countdownVal<=1){
      f.countdownVal = 0;
      beginStepAction(step);
    } else {
      f.countdownVal--;
      countdownTick(step);
    }
  }, 667);
}
function beginStepAction(step){
  const f = ui.flow;
  if(navigator.vibrate) navigator.vibrate(80);
  if(isAutoCapable(step)){
    f.autoPhase = "active";
    if(step.niveau.doelType==="seconden") startAutoSeconden(); else startAutoReps();
  } else {
    f.autoPhase = null;
    render();
  }
}
// Timer ticks patch just the ring/number instead of a full render() — a full render tears down and
// rebuilds every node (incl. re-wiring all listeners and restarting the stick-figure CSS animation),
// which is wasteful and visibly janky when it happens every second during a hold or rest.
function patchWfTimer(pct, timeText){
  const ring = document.getElementById("wf-ring");
  const time = document.getElementById("wf-time");
  if(!ring || !time){ render(); return; }
  ring.style.setProperty("--pct", pct);
  time.textContent = timeText;
}
function flowControls(){
  const f = ui.flow;
  return `<div class="row wrap" style="justify-content:center;gap:8px;margin-bottom:6px">
    <button class="btn btn-sm ${f.autoRun?"":"btn-ghost"}" data-action="toggle-autorun">Automatisch: ${f.autoRun?"aan":"uit"}</button>
    <button class="btn btn-sm ${state.instellingen.spraak?"":"btn-ghost"}" data-action="toggle-spraak">Stem: ${state.instellingen.spraak?"aan":"uit"}</button>
  </div>`;
}
function startAutoSeconden(){
  const f = ui.flow;
  const step = currentStep();
  f.secTotal = step.max;
  f.secElapsed = 0;
  f.secRunning = true;
  render();
  f.secTimer = setInterval(()=>{
    f.secElapsed++;
    if(f.secTotal>15 && f.secElapsed===f.secTotal-10) speak("Nog tien seconden.");
    if(f.secElapsed >= f.secTotal){
      clearInterval(f.secTimer); f.secTimer=null;
      f.secRunning = false; f.autoPhase = null;
      if(navigator.vibrate) navigator.vibrate(200);
      speak("Klaar.");
      f.inputVal = f.secTotal;
      logCurrentSet();
      return;
    }
    patchWfTimer(Math.min(100, Math.round((f.secElapsed/f.secTotal)*100)), f.secElapsed+"s");
  },1000);
}
function startAutoReps(){
  const f = ui.flow;
  const step = currentStep();
  const holdSec = step.niveau.holdSec;
  const target = step.max;
  f.autoRepsCompleted = 0;
  f.holdTotal = holdSec;
  f.holdRemaining = holdSec;
  f.holdRunning = true;
  speak("Vast.");
  render();
  autoRepTick(holdSec, target);
}
function autoRepTick(holdSec, target){
  const f = ui.flow;
  f.autoTimer = setInterval(()=>{
    f.holdRemaining--;
    if(f.holdRemaining<=0){
      clearInterval(f.autoTimer); f.autoTimer=null;
      f.holdRunning = false;
      f.autoRepsCompleted++;
      if(navigator.vibrate) navigator.vibrate(120);
      if(f.autoRepsCompleted >= target){
        speak("Klaar.");
        f.autoPhase = null;
        f.inputVal = target;
        logCurrentSet();
        return;
      }
      speak("Los.");
      f.autoTimer = setTimeout(()=>{
        f.holdRunning = true;
        f.holdRemaining = holdSec;
        speak("Vast.");
        autoRepTick(holdSec, target);
      }, 1800);
      render();
      return;
    }
    patchWfTimer(Math.round((1-f.holdRemaining/holdSec)*100), f.holdRemaining+"s");
  },1000);
}
function stopAuto(){
  const f = ui.flow;
  const step = currentStep();
  stopSpeech();
  clearTimers();
  f.autoPhase = null;
  f.countdownVal = 0;
  if(step.niveau.doelType==="seconden"){ f.secRunning=false; f.inputVal=f.secElapsed; }
  else { f.holdRunning=false; f.inputVal=f.autoRepsCompleted; }
  render();
}
function finishWorkout(){
  const workoutId = ui.flow.workoutId;
  const results = ui.flow.results;
  const durMin = Math.max(1, Math.round((Date.now()-ui.flow.startTime)/60000));
  const oefeningIds = [...new Set(results.map(r=>r.oefeningId))];
  ui.afsluit = {
    workoutId, results, durMin,
    feedback: Object.fromEntries(oefeningIds.map(id=>[id,"goed"]))
  };
  ui.flow = null;
  clearSavedFlow();
  releaseWakeLock();
  ui.screen = "afsluiten";
  render();
}
const WARMUP_UITLEG = {
  "cat-camel": "Op handen en knieën: rond je rug bol als een kat, en beweeg daarna rustig naar de tegenovergestelde stand met je buik iets naar de vloer. Rustig tempo, geen kracht.",
  "schouderrollen": "Sta rechtop en rol je schouders in rustige, grote cirkels naar achteren.",
  "heupcirkels": "Handen in je zij, maak rustige grote cirkels met je heupen, eerst de ene kant op, dan de andere.",
  "lichte squat": "Een paar keer licht zakken en weer overeind komen, zoals de squat verderop in de workout, maar dan zonder te tellen op kracht — gewoon je lijf op gang brengen."
};
function warmupUitlegFor(item){

}
// Uitklapbare lijst van alle oefeningen in deze workout, getoond tijdens de warming-up: zo kun je
// vooraf uitzoeken hoe onbekende oefeningen moeten en daarna de hele set in één keer afwerken,
// zonder halverwege te stoppen om iets op te zoeken. Openklappen telt als "geïntroduceerd", zodat
// de app die oefening niet nog eens automatisch pauzeert tijdens de workout — de "i"-knop blijft
// beschikbaar tijdens elke set voor oefeningen die je hier hebt overgeslagen.

    ${ids.map(id=>{

      return `<details data-oefening-preview="${id}">

function renderWorkoutFlow(){

function progressDots(){

function renderRestStep(step){
  const f = ui.flow;
  if(f.restTotal===0){

  }
  const pct = Math.round((1 - f.restRemaining/f.restTotal)*100);

    ${flowControls()}
    ${progressDots()}
    <h2 style="margin-top:20px">Rust</h2>

    <button class="btn btn-primary btn-block btn-huge" data-action="rest-skip">Overslaan</button>

function startRestTimer(){
  const f = ui.flow;
  f.timer = setInterval(()=>{
    f.restRemaining--;
    if(f.restRemaining===10 && f.restTotal>15) speak("Nog tien seconden.");
    if(f.restRemaining<=0){
      clearInterval(f.timer); f.timer=null;
      if(navigator.vibrate) navigator.vibrate(200);
      f.restTotal=0; f.restRemaining=0;
      speak("Ga verder.");
      advanceStep();
    } else {
      patchWfTimer(Math.round((1-f.restRemaining/f.restTotal)*100), f.restRemaining+"s");
    }
  },1000);
}
function doelLabel(step){
  const {oefening,niveau,min,max,kant} = step;
  const kantTxt = kant ? ` — ${kant==="links"?"linkerkant":"rechterkant"}` : "";
  if(niveau.doelType==="seconden") return `Doel: ${min}-${max} sec${kantTxt}`;
  const holdTxt = niveau.holdSec ? `, hold ${niveau.holdSec} sec per rep` : "";
  const woord = niveau.doelType==="holds" ? "holds" : "reps";
  return `Doel: ${min}-${max} ${woord}${holdTxt}${kantTxt}`;

      <div class="row" style="justify-content:center;gap:12px;margin-bottom:14px">

        <div class="timer-ring" id="wf-ring" style="width:110px;height:110px;--pct:${pct}"><div class="inner" style="width:88px;height:88px"><div class="time" id="wf-time" style="font-size:22px">${f.holdRunning?f.holdRemaining:step.niveau.holdSec}s</div></div></div>
      </div>
      <div class="row" style="justify-content:center;margin-bottom:14px">
        <button class="btn btn-ghost" data-action="auto-stop">Stoppen / handmatig</button>
      </div>`;
    } else {
      timerBlock = `<div class="row" style="justify-content:center;align-items:center;gap:14px;margin-bottom:10px">
      <div class="timer-ring" id="wf-ring" style="width:110px;height:110px;--pct:${pct}"><div class="inner" style="width:88px;height:88px"><div class="time" id="wf-time" style="font-size:22px">${f.holdRunning?f.holdRemaining:step.niveau.holdSec}s</div></div></div>
      <button class="btn" data-action="hold-start" ${f.holdRunning?"disabled":""}>Start hold-timer</button>
    </div>`;
    }
  }
  const valLabel = isSeconden ? "seconden" : (step.niveau.doelType==="holds" ? "holds" : "reps");
  const autoBadge = autoCapable ? `<span class="badge">Handsfree</span>` : `<span class="badge warn">1 tik per set</span>`;

function secStart(){
  const f = ui.flow;
  f.secTotal = currentStep().max;
  f.secRunning = true;
  f.secTimer = setInterval(()=>{
    f.secElapsed++;
    patchWfTimer(Math.min(100, Math.round((f.secElapsed/f.secTotal)*100)), f.secElapsed+"s");
  },1000);
  render();
}
function secStop(){
  const f = ui.flow;
  if(f.secTimer){ clearInterval(f.secTimer); f.secTimer=null; }
  f.secRunning = false;
  f.inputVal = f.secElapsed;
  render();
}
function secReset(){
  const f = ui.flow;
  f.secElapsed = 0; f.inputVal = 0;
  render();
}
function holdStart(){
  const f = ui.flow;
  const step = currentStep();
  f.holdTotal = step.niveau.holdSec;
  f.holdRemaining = step.niveau.holdSec;
  f.holdRunning = true;
  f.holdTimer = setInterval(()=>{
    f.holdRemaining--;
    if(f.holdRemaining<=0){
      clearInterval(f.holdTimer); f.holdTimer=null;
      if(navigator.vibrate) navigator.vibrate(150);
      f.holdRunning=false; f.holdTotal=0;
      render();
      return;
    }
    patchWfTimer(Math.round((1-f.holdRemaining/f.holdTotal)*100), f.holdRemaining+"s");
  },1000);
  render();
}
function logCurrentSet(){
  const f = ui.flow;
  const step = currentStep();
  const isSeconden = step.niveau.doelType==="seconden";
  const val = isSeconden ? (f.inputVal!==null?f.inputVal:f.secElapsed) : f.inputVal;
  const entry = {oefeningId:step.oefeningId, set:step.set, niveau:step.niveau.n, kant:step.kant||null};
  if(isSeconden){ entry.seconden = val; entry.reps = 1; }
  else { entry.reps = val; if(step.niveau.holdSec) entry.holdSec = step.niveau.holdSec; }
  f.results.push(entry);
  advanceStep();
}

/* ===================== AFSLUITSCHERM (scherm 3) ===================== */
const FEEDBACK_OPTIES = [
  {v:"te_makkelijk", label:"Te makkelijk"},
  {v:"goed", label:"Goed"},
  {v:"te_zwaar", label:"Te zwaar"},
  {v:"niet_lekker", label:"Voelde niet lekker"}
];
function raakteMax(oefeningId, results){
  const entries = results.filter(r=>r.oefeningId===oefeningId);
  if(entries.length===0) return false;
  const {max, niveau} = doelBereik(oefeningId);
  const isSeconden = niveau.doelType==="seconden";
  return entries.every(e => isSeconden ? (e.seconden>=max) : (e.reps>=max));
}
function renderAfsluiten(){
  const a = ui.afsluit;
  if(!a) return "";
  if(!a.confirmed) return renderAfsluitenFeedback(a);
  return renderAfsluitenSamenvatting(a);
}
function renderAfsluitenFeedback(a){
  const oefeningIds = Object.keys(a.feedback);
  return `<div class="screen">
    <p class="muted">Alles staat op "goed". Tik alleen aan wat afweek.</p>
    ${oefeningIds.map(id=>{
      const oef = getOefening(id);
      return `<div class="card">
        <div style="font-weight:700;margin-bottom:6px">${escapeHtml(oef.naam)}</div>
        <div class="feedback-grid">
          ${FEEDBACK_OPTIES.map(o=>{
            const active = a.feedback[id]===o.v;
            let cls = active ? "active" : "";
            if(active && o.v==="te_zwaar") cls += " warn-sel";
            if(active && o.v==="niet_lekker") cls += " danger-sel";
            return `<button class="${cls}" data-action="fb-set" data-oefening="${id}" data-val="${o.v}">${o.label}</button>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
    <button class="btn btn-primary btn-block btn-huge" data-action="fb-confirm">Bevestigen</button>
  </div>`;
}
function feedbackLabel(v){ return (FEEDBACK_OPTIES.find(o=>o.v===v)||{}).label || v; }
function confirmSession(){
  const a = ui.afsluit;
  a.voortgangSnapshot = JSON.parse(JSON.stringify(state.voortgang));
  const session = {
    datum: isoDate(new Date()),
    workoutId: a.workoutId,
    sets: a.results.map(r=>({oefeningId:r.oefeningId, set:r.set, niveau:r.niveau, kant:r.kant, reps:r.reps, holdSec:r.holdSec, seconden:r.seconden})),
    feedback: Object.entries(a.feedback).map(([oefeningId,score])=>({oefeningId,score})),
    duurMin: a.durMin
  };
  state.log.sessies.push(session);
  const suggesties = [];
  Object.keys(a.feedback).forEach(id=>{
    const vg = ensureVoortgang(id);
    const oef = getOefening(id);
    const fb = a.feedback[id];
    const hitMax = raakteMax(id, a.results);
    if(hitMax && fb!=="te_zwaar" && fb!=="niet_lekker") vg.promotieTeller++; else vg.promotieTeller=0;
    if(fb==="te_zwaar") vg.zwaarTeller++; else vg.zwaarTeller=0;
    if(fb==="niet_lekker") vg.nietLekkerTeller++; else vg.nietLekkerTeller=0;
    if(vg.nietLekkerTeller>=2) vg.vervangingsmarkering=true;
    const volgendNiveau = oef.niveaus.find(n=>n.n===vg.niveau+1);
    if(vg.promotieTeller>=2 && volgendNiveau){
      suggesties.push({id:"promo-"+id, oefeningId:id, type:"promotie", naarNiveau:volgendNiveau});
    }
    if(vg.zwaarTeller>=2){
      suggesties.push({id:"degrad-"+id, oefeningId:id, type:"degradatie"});
    }
  });
  a.confirmed = true;
  a.suggesties = suggesties;
  render();
}
function resolveSuggestie(suggestieId, actie){
  const a = ui.afsluit;
  const s = a.suggesties.find(x=>x.id===suggestieId);
  if(!s) return;
  const vg = ensureVoortgang(s.oefeningId);
  if(s.type==="promotie"){
    if(actie==="bevestig") vg.niveau = s.naarNiveau.n;
    vg.promotieTeller = 0;
  } else if(s.type==="degradatie"){
    if(actie==="niveau-omlaag") { vg.niveau = Math.max(1, vg.niveau-1); vg.rangeAdjust=0; }
    else if(actie==="bereik-verlagen") { vg.rangeAdjust -= 1; }
    vg.zwaarTeller = 0;
  }
  a.suggesties = a.suggesties.filter(x=>x.id!==suggestieId);
  render();
}
function renderAfsluitenSamenvatting(a){
  const totalSets = a.results.length;
  return `<div class="screen">
    <div class="card center">
      <h2>Sessie voltooid</h2>
      <p class="muted">${totalSets} sets gelogd · ${a.durMin} min</p>
    </div>
    ${a.suggesties.length>0 ? a.suggesties.map(s=>renderSuggestieCard(s)).join("") : ""}
    ${a.suggesties.length===0 ? `<p class="muted center">Geen promotie- of aanpassingsvoorstellen deze keer.</p>` : ""}
    <button class="btn btn-primary btn-block btn-huge" data-action="afsluiten-klaar" style="margin-top:10px" ${a.suggesties.length>0?"disabled":""}>Klaar</button>
    ${a.suggesties.length>0 ? `<p class="fine center" style="margin-top:8px">Verwerk eerst de voorstellen hierboven.</p>`:""}
    <button class="btn btn-ghost btn-block" data-action="undo-session" style="margin-top:10px">Niet meetellen (testen of oefenen)</button>
    <p class="fine center" style="margin-top:4px">Haalt deze sessie weer uit je log en zet niveaus/tellers terug — handig als je net aan het testen of oefenen was.</p>
  </div>`;
}
function undoSession(){
  const a = ui.afsluit;
  if(a.voortgangSnapshot) state.voortgang = a.voortgangSnapshot;

  ui.afsluit = null;

  const oef = getOefening(s.oefeningId);

      <button class="btn btn-ghost" data-action="sugg" data-id="${s.id}" data-actie="negeer">Negeren</button>

/* ===================== VOORTGANG (scherm 5) ===================== */
function sessieWaarde(session, oefeningId){
  const entries = session.sets.filter(s=>s.oefeningId===oefeningId);
  if(entries.length===0) return null;
  const oef = getOefening(oefeningId);
  const niveau = getNiveau(oef, entries[0].niveau);
  if(niveau.doelType==="seconden"){
    const vals = entries.map(e=>e.seconden||0);
    return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  }
  const vals = entries.map(e=>e.reps||0);
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function renderVoortgang(){
  return `<div class="screen">
    <div class="tabbar">
      <button class="${ui.voortgangTab==='oefeningen'?'active':''}" data-action="voortgang-tab" data-tab="oefeningen">Oefeningen</button>
      <button class="${ui.voortgangTab==='gewicht'?'active':''}" data-action="voortgang-tab" data-tab="gewicht">Gewicht</button>
    </div>
    ${ui.voortgangTab==="oefeningen" ? renderVoortgangOefeningen() : renderVoortgangGewicht()}
  </div>`;
}
function renderVoortgangOefeningen(){
  return state.programma.oefeningen.map(oef=>{
    const vg = state.voortgang[oef.id];
    const niveau = getNiveau(oef, vg.niveau);
    const sessies = state.log.sessies.filter(s=>s.sets.some(st=>st.oefeningId===oef.id)).slice(-10);
    const waarden = sessies.map(s=>sessieWaarde(s,oef.id)).filter(v=>v!==null);
    const maxWaarde = Math.max(niveau.max, ...waarden, 1);
    return `<div class="card">
      <div class="space-between">
        <div>
          <div style="font-weight:700">${escapeHtml(oef.naam)}</div>
          <div class="muted small">Niveau ${niveau.n} — ${escapeHtml(niveau.naam)}${vg.vervangingsmarkering?' · gemarkeerd voor vervanging':''}</div>
        </div>
        <button class="icon-btn" data-action="open-uitleg" data-oefening="${oef.id}">i</button>
      </div>
      ${waarden.length>0 ? `<div class="bar-chart">${waarden.map(v=>`<div class="bar" style="height:${Math.max(4,Math.round(v/maxWaarde*100))}%"><span class="lbl">${v}</span></div>`).join("")}</div>` : `<p class="muted small">Nog geen sessies gelogd.</p>`}
    </div>`;
  }).join("");
}
function renderVoortgangGewicht(){
  const rows = state.log.gewicht;
  const vals = rows.map(r=>r.kg);
  const min = vals.length? Math.min(...vals):0, max = vals.length? Math.max(...vals):1;
  const w=300,h=110;
  let poly = "";
  if(rows.length>1){
    const pts = rows.map((r,i)=>{
      const x = rows.length>1 ? (i/(rows.length-1))*w : 0;
      const y = max===min ? h/2 : h - ((r.kg-min)/(max-min))*h;
      return `${x},${y}`;
    });
    poly = `<polyline points="${pts.join(" ")}" fill="none" stroke="var(--primary)" stroke-width="3"/>`;
  }
  return `<div class="card">
    <div class="field">
      <label for="gewicht-kg">Gewicht (kg)</label>
      <input type="number" step="0.1" id="gewicht-kg" placeholder="bijv. 80.5">
    </div>
    <button class="btn btn-primary btn-block" data-action="gewicht-toevoegen">Toevoegen</button>
  </div>

const ANALYSE_PROMPT = `Hierbij de export van mijn workout-app (JSON). Analyseer mijn progressie en stel het volgende programmablok samen (4 tot 6 weken). Regels: houd de McGill Big 3 als vaste kern; feedback "te makkelijk" versnelt progressie, "te zwaar" vertraagt, oefeningen met vervangingsmarkering of herhaald "voelde niet lekker" vervang je door een alternatief binnen hetzelfde bewegingspatroon; houd rekening met de seizoensinstelling; ik train thuis zonder materiaal, adviseer alleen bij duidelijke meerwaarde een aanschaf (zoals een weerstandsband) en vraag dat eerst. Onderbouw je keuzes kort. Lever daarna het nieuwe blok als één JSON-codeblok met exact deze structuur: { "schemaVersion": 1, "programma": { ... } }, inclusief volledige Nederlandse uitlegteksten per oefening (kort, uitvoering, fouten, spieren, stoppen) en startNiveau per oefening. Nieuwe oefeningen krijgen "animatie": null; die voeg ik later toe.`;

    </div>

function doExport(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `kernkracht-export-${isoDate(new Date())}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  state.instellingen.laatsteExport = isoDate(new Date());
  render();
}
function validateProgramma(p){
  if(!p || typeof p!=="object") return "Bestand mist een programma-object.";
  if(!Array.isArray(p.workouts) || !Array.isArray(p.oefeningen)) return "Programma mist workouts of oefeningen.";
  if(p.oefeningen.length===0) return "Programma bevat geen oefeningen.";
  for(const o of p.oefeningen){
    if(!o.id || !o.naam || !Array.isArray(o.niveaus) || o.niveaus.length===0) return `Oefening "${o.id||'?'}" is onvolledig.`;
    if(!o.uitleg || typeof o.uitleg.kort!=="string") return `Oefening "${o.id}" mist uitlegtekst.`;
  }
  for(const w of p.workouts){
    if(!w.id || !Array.isArray(w.oefeningen)) return `Workout "${w.id||'?'}" is onvolledig.`;
    for(const wo of w.oefeningen){
      if(!p.oefeningen.some(o=>o.id===wo.oefeningId)) return `Workout "${w.id}" verwijst naar onbekende oefening "${wo.oefeningId}".`;
    }
  }
  if(!p.startDatum || !p.duurWeken) return "Programma mist startDatum of duurWeken.";
  return null;
}
function doImport(){
  ui.importError = null; ui.importOk = false;
  const input = document.getElementById("import-file");
  const file = input && input.files && input.files[0];
  if(!file){ ui.importError = "Kies eerst een bestand."; render(); return; }
  const reader = new FileReader();
  reader.onload = () => {
    let obj;
    try{ obj = JSON.parse(reader.result); }
    catch(e){ ui.importError = "Dit is geen geldig JSON-bestand."; render(); return; }
    if(!obj || obj.schemaVersion!==1){ ui.importError = "Onbekend of ontbrekend schemaVersion — dit bestand hoort niet bij Kernkracht."; render(); return; }
    const err = validateProgramma(obj.programma);
    if(err){ ui.importError = "Ongeldig bestand: " + err; render(); return; }
    const isFullState = ("voortgang" in obj) && ("instellingen" in obj) && ("log" in obj);
    if(isFullState){
      state = obj;
      if(!state.voortgang) state.voortgang = defaultVoortgang(state.programma);
    } else {
      state.schemaVersion = obj.schemaVersion;
      state.programma = obj.programma;
      if(typeof state.programma.verschovenDagen!=="number") state.programma.verschovenDagen = 0;
      if(typeof state.programma.blokreviewGedaan!=="boolean") state.programma.blokreviewGedaan = false;
      const newVoortgang = {};
      state.programma.oefeningen.forEach(oef=>{
        const niveau = oef.startNiveau || 1;
        newVoortgang[oef.id] = {niveau, promotieTeller:0, zwaarTeller:0, nietLekkerTeller:0, vervangingsmarkering:false, rangeAdjust:0, geintroduceerd:false};
      });
      state.voortgang = newVoortgang;
    }
    ui.importOk = true;
    ui.screen = "vandaag";
    render();
  };
  reader.onerror = () => { ui.importError = "Bestand kon niet worden gelezen."; render(); };
  reader.readAsText(file);
}
function copyPrompt(){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(ANALYSE_PROMPT).catch(()=>{});
  }
}

/* ===================== REMINDER (F6, best effort) ===================== */
function checkReminder(){
  const i = state.instellingen;
  if(!i.reminder || !("Notification" in window) || Notification.permission!=="granted") return;
  const now = new Date();
  if(now.getDay()!==i.trainingsdag) return;
  const [hh,mm] = (i.reminderTijd||"20:00").split(":").map(Number);
  const target = new Date(); target.setHours(hh,mm,0,0);
  if(now < target) return;
  const lastKey = "kernkracht_reminder_lastdate";
  if(localStorage.getItem(lastKey) === isoDate(now)) return;
  try{
    new Notification("Tijd om te trainen", {body:"Vandaag staat je workout gepland.", icon:undefined});
    localStorage.setItem(lastKey, isoDate(now));
  }catch(e){}
}

/* ===================== EVENT WIRING ===================== */
function onAction(e){
  const el = e.currentTarget;
  const action = el.dataset.action;
  switch(action){
    case "ga-vandaag": goto("vandaag"); break;
    case "ga-instellingen": goto("instellingen"); break;
    case "ga-voortgang": goto("voortgang"); break;
    case "ga-export": ui.importError=null; ui.importOk=false; goto("export"); break;
    case "ob-dag": ui.onboarding.trainingsdag = Number(el.dataset.dag); render(); break;
    case "ob-start": completeOnboarding(); break;
    case "disclaimer-akkoord": state.instellingen.disclaimerGezien = true; render(); break;
    case "open-microkeuze": ui.microKeuzeOpen = true; render(); break;
    case "close-microkeuze": ui.microKeuzeOpen = false; render(); break;
    case "start-workout": ui.microKeuzeOpen = false; startWorkout(el.dataset.workout); break;
    case "week-overslaan": weekOverslaan(); break;
    case "warmup-klaar": stopSpeech(); ui.flow.warmup = false; saveFlowSnapshot(); render(); break;
    case "stop-workout": if(confirm("Workout afbreken? Voortgang van deze sessie gaat verloren.")){ clearTimers(); ui.flow=null; goto("vandaag"); } break;
    case "open-uitleg": ui.detailOefeningId = el.dataset.oefening; pauseFlowForDetail(); render(); break;
    case "close-detail": ui.detailOefeningId = null; resumeFlowAfterDetail(); render(); break;
    case "val-min": ui.flow.inputVal = Math.max(0, ui.flow.inputVal-1); render(); break;
    case "val-plus": ui.flow.inputVal = ui.flow.inputVal+1; render(); break;
    case "log-set": stopSpeech(); logCurrentSet(); break;
    case "sec-start": secStart(); break;
    case "sec-stop": secStop(); break;
    case "sec-reset": secReset(); break;
    case "hold-start": holdStart(); break;
    case "rest-skip": stopSpeech(); clearTimers(); ui.flow.restTotal=0; ui.flow.restRemaining=0; advanceStep(); break;
    case "toggle-autorun": ui.flow.autoRun = !ui.flow.autoRun; render(); break;
    case "toggle-spraak": state.instellingen.spraak = !state.instellingen.spraak; if(!state.instellingen.spraak && "speechSynthesis" in window) speechSynthesis.cancel(); render(); break;
    case "auto-stop": stopAuto(); break;
    case "fb-set": ui.afsluit.feedback[el.dataset.oefening] = el.dataset.val; render(); break;
    case "fb-confirm": confirmSession(); break;
    case "sugg": resolveSuggestie(el.dataset.id, el.dataset.actie); break;
    case "afsluiten-klaar": ui.afsluit = null; goto("vandaag"); break;
    case "undo-session": undoSession(); break;
    case "voortgang-tab": ui.voortgangTab = el.dataset.tab; render(); break;
    case "gewicht-toevoegen": voegGewichtToe(); break;
    case "br-gevoel": ui.blokreview.perOefening[el.dataset.oefening].gevoel = el.dataset.val; render(); break;
    case "br-confirm": confirmBlokreview(); break;
    case "set-trainingsdag": state.instellingen.trainingsdag = Number(el.dataset.dag); render(); break;
    case "test-stem": speakTest(); break;
    case "do-export": doExport(); break;
    case "do-import": doImport(); break;
    case "copy-prompt": copyPrompt(); break;
  }
}
function completeOnboarding(){
  const ob = ui.onboarding;
  state.programma.startDatum = isoDate(nextDateForWeekday(ob.trainingsdag));
  state.programma.naam = ob.naam || "Blok 1";
  state.instellingen.trainingsdag = ob.trainingsdag;
  state.instellingen.seizoen = !!ob.seizoen;
  state.instellingen.lengteCm = ob.lengteCm ? parseFloat(ob.lengteCm) : null;
  state.instellingen.disclaimerGezien = true;
  state.onboarded = true;
  ui.onboarding = null;
  goto("vandaag");
}
function weekOverslaan(){
  const wi = weekInfo();
  state.log.overgeslagenWeken.push({datum:isoDate(new Date()), weekNummer:wi.weekNummer});
  state.programma.verschovenDagen = (state.programma.verschovenDagen||0) + 7;
  render();
}
function voegGewichtToe(){
  const input = document.getElementById("gewicht-kg");
  const kg = parseFloat(input && input.value);
  if(!kg || kg<=0) return;
  state.log.gewicht.push({datum:isoDate(new Date()), kg});
  render();
}
function confirmBlokreview(){
  const br = ui.blokreview;
  state.log.blokreviews.push({
    blok: state.programma.blok,
    datum: isoDate(new Date()),
    perOefening: Object.entries(br.perOefening).map(([oefeningId,v])=>({oefeningId, gevoel:v.gevoel, opmerking:v.opmerking})),
    algemeen: br.algemeen
  });
  state.programma.blokreviewGedaan = true;
  ui.blokreview = null;
  ui.screen = "export";
  render();
}
function wireBoundInputs(){
  const bindText = (id, setter) => {
    const el = document.getElementById(id);
    if(el) el.addEventListener("input", () => setter(el.value));
  };
  document.querySelectorAll("[data-oefening-preview]").forEach(el=>{
    el.addEventListener("toggle", ()=>{
      if(el.open){ ensureVoortgang(el.dataset.oefeningPreview).geintroduceerd = true; save(); }
    });
  });
  if(ui.onboarding){
    bindText("ob-naam", v=>ui.onboarding.naam=v);
    bindText("ob-lengte", v=>ui.onboarding.lengteCm=v);
    const seizoen = document.getElementById("ob-seizoen");
    if(seizoen) seizoen.addEventListener("change", ()=>{ ui.onboarding.seizoen = seizoen.checked; });
    const akkoord = document.getElementById("ob-akkoord");
    if(akkoord) akkoord.addEventListener("change", ()=>{ ui.onboarding.akkoord = akkoord.checked; render(); });
  }
  const setReminder = document.getElementById("set-reminder");
  if(setReminder) setReminder.addEventListener("change", ()=>{
    state.instellingen.reminder = setReminder.checked;
    if(setReminder.checked && "Notification" in window && Notification.permission==="default"){
      Notification.requestPermission();
    }
    render();
  });
  bindText("set-reminder-tijd", v=>state.instellingen.reminderTijd=v);
  const setSeizoen = document.getElementById("set-seizoen");
  if(setSeizoen) setSeizoen.addEventListener("change", ()=>{ state.instellingen.seizoen = setSeizoen.checked; render(); });
  const setAutorun = document.getElementById("set-autorun");
  if(setAutorun) setAutorun.addEventListener("change", ()=>{ state.instellingen.autoRun = setAutorun.checked; render(); });
  const setSpraak = document.getElementById("set-spraak");
  if(setSpraak) setSpraak.addEventListener("change", ()=>{ state.instellingen.spraak = setSpraak.checked; if(!setSpraak.checked && "speechSynthesis" in window) speechSynthesis.cancel(); render(); });
  bindText("set-azure-key", v=>state.instellingen.azureKey = v||null);
  bindText("set-azure-region", v=>state.instellingen.azureRegion = v||null);
  const setAzureVoice = document.getElementById("set-azure-voice");
  if(setAzureVoice) setAzureVoice.addEventListener("change", ()=>{ state.instellingen.azureVoice = setAzureVoice.value; render(); });
  bindText("set-lengte", v=>state.instellingen.lengteCm = v?parseFloat(v):null);
  if(ui.blokreview){
    document.querySelectorAll("[data-bind-br]").forEach(el=>{
      el.addEventListener("input", ()=>{ ui.blokreview.perOefening[el.dataset.bindBr].opmerking = el.value; });
    });
    bindText("br-algemeen", v=>ui.blokreview.algemeen=v);
  }
  document.querySelectorAll(".modal-overlay").forEach(ov=>{
    ov.addEventListener("click", (e)=>{
      if(e.target !== ov) return;
      const which = ov.dataset.overlay;
      if(which==="detail"){ ui.detailOefeningId = null; resumeFlowAfterDetail(); }
      else if(which==="microkeuze") ui.microKeuzeOpen = false;
      else return;
      render();
    });
  });
}
function wireCommon(){
  APP_EL.querySelectorAll("[data-action]").forEach(el=>{
    el.addEventListener("click", onAction);
  });
  wireBoundInputs();
}

/* ===================== WORKOUT-VOORTGANG BEWAREN OVER RELOAD ===================== */
// Android kan de PWA-pagina op elk moment herladen zodra hij naar de achtergrond gaat (andere app,
// scherm uit, een externe link zoals YouTube) — zonder dit zou je dan terugvallen op "Vandaag" en je
// voortgang in de workout kwijtraken. We bewaren daarom genoeg om de huidige stap terug te vinden;
// die stap start bij herstel gewoon opnieuw (zelfde gedrag als na het sluiten van de uitleg-modal).
const FLOW_STORAGE_KEY = "kernkracht_flow_v1";
function saveFlowSnapshot(){
  if(!ui.flow) return;
  const snap = {
    workoutId: ui.flow.workoutId, index: ui.flow.index, results: ui.flow.results,
    startTime: ui.flow.startTime, warmup: ui.flow.warmup, autoRun: ui.flow.autoRun
  };
  try{ localStorage.setItem(FLOW_STORAGE_KEY, JSON.stringify(snap)); }catch(e){}
}
function clearSavedFlow(){
  try{ localStorage.removeItem(FLOW_STORAGE_KEY); }catch(e){}
}
function restoreFlowIfAny(){
  if(!state.onboarded) return;
  let snap;
  try{ snap = JSON.parse(localStorage.getItem(FLOW_STORAGE_KEY)); }catch(e){ return; }
  if(!snap || !snap.workoutId) return;
  const workout = getWorkout(snap.workoutId);
  if(!workout) { clearSavedFlow(); return; }
  const steps = buildSteps(workout);
  if(!(snap.index>=0) || snap.index>=steps.length){ clearSavedFlow(); return; }
  ui.flow = {
    workoutId: snap.workoutId, steps, index: snap.index, results: snap.results||[], startTime: snap.startTime||Date.now(),
    warmup: !!snap.warmup, warmupAnnounced:false, timer:null, restRemaining:0, restTotal:0,
    holdTimer:null, holdRemaining:0, holdTotal:0, holdRunning:false,
    secTimer:null, secElapsed:0, secTotal:0, secRunning:false,
    inputVal:null,
    autoRun: snap.autoRun!==false,
    autoTimer:null, autoPhase:null, autoStarted:false, autoRepsCompleted:0,
    countdownTimer:null, countdownVal:0, pausedForDetail:false
  };
}

/* ===================== INIT ===================== */
restoreFlowIfAny();
render();
setInterval(checkReminder, 60000);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) checkReminder(); });
checkReminder();
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js", {updateViaCache:"none"}).catch(()=>{});
  });
}
</script>
</body>
